<script>window.KB=[{"name": "自我介绍", "patterns": ["自我介绍", "介绍一下自己", "说说你自己"], "keywords": "中国科学院大学｜数字IC｜SoC前端｜存储控制器｜50 GHz存储", "answer": "您好，我叫李立娟，目前在中国科学院大学学习集成电路设计与制造。我的研究和实习主要围绕高性能计算、近存计算和数字芯片前端设计展开。实习中，我参与AI存算一体SoC前端设计，做过bank_controller、MC到AXI桥接和APB到自定义SR接口适配，也接触了RTL、CDC、SDC、综合和PTPX功耗分析。科研方面，我完成过16-bit超导动态循环存储器设计与流片验证，实现最高50 GHz稳定运行。我希望从事数字芯片设计、SoC前端或验证相关工作。"}, {"name": "实习工作", "patterns": ["实习做了什么", "介绍实习", "工作内容", "负责什么"], "keywords": "存算一体SoC｜MC后端｜AXI/APB｜CDC｜PTPX", "answer": "我目前参与面向AI计算的存算一体SoC前端设计与集成。主要工作包括MC后端bank_controller、多bank接口到AXI4 Master的mc2axi桥接，以及APB到srtop自定义SR接口的apb2srtop适配。同时我也接触Lint、SDC、综合网表、UPF和PTPX功耗分析。我的工作重点是存储访问控制、接口协议转换、跨时钟域处理以及系统集成问题定位。"}, {"name": "bank_controller", "patterns": ["bank_controller", "bank controller", "bank控制器", "mc后端"], "keywords": "bank选择｜地址生成｜ACT｜读写调度｜RMW｜PIM", "answer": "bank_controller位于Memory Controller后端，负责把上层请求转换成底层memory bank能够执行的控制时序。它完成bank选择、地址生成、ACT控制、读写调度、写数据组织和读返回管理。部分写时采用RMW，先读取旧数据，再替换目标字段并组成完整256-bit数据写回，避免覆盖未修改部分。同时保留PIM相关控制路径，使普通读写、部分写和PIM访问能够在同一框架中协同工作。"}, {"name": "RMW", "patterns": ["rmw", "读改写", "部分写", "局部写"], "keywords": "读取旧数据｜字段替换｜256-bit｜write-back｜原子性", "answer": "RMW就是Read-Modify-Write，主要用于部分写。底层一次写回可能要求完整256-bit数据，但上层只修改其中一部分，因此控制器先读取目标地址旧数据，根据写掩码替换需要更新的字段，再组合成完整数据写回。这样可以保护未修改内容。难点是保证读、合并和写回过程不被冲突请求破坏。"}, {"name": "mc2axi", "patterns": ["mc2axi", "mc到axi", "axi桥接", "dfi转axi"], "keywords": "AXI4五通道｜command｜仲裁｜异步FIFO｜CDC｜地址映射", "answer": "mc2axi把MC侧多bank访存接口转换成标准AXI4 Master事务。MC侧先捕获各bank请求，把地址、读写类型和数据整理成command；多个请求经过仲裁后，通过异步FIFO跨到AXI时钟域；AXI侧再生成AW、W、B、AR、R五通道握手。设计重点是跨时钟域数据一致性、通道解耦、返回与原请求的对应，以及full-bank和half-bank地址映射。"}, {"name": "AXI与APB", "patterns": ["axi和apb", "apb和axi", "为什么用apb", "为什么用axi"], "keywords": "AXI高带宽｜多通道｜突发｜APB简单｜寄存器配置", "answer": "AXI面向高带宽数据传输，读写通道独立，支持VALID/READY握手和突发传输，适合NPU、MC和存储数据通路。APB结构简单，适合低速寄存器配置和状态读取。在我的项目中，MC到FPGA memory的数据访问使用AXI，而外部对srtop的控制和状态访问使用APB。"}, {"name": "apb2srtop", "patterns": ["apb2srtop", "apb到srtop", "sr接口", "apb桥接"], "keywords": "命令缓存｜pending队列｜CDC握手｜SR状态机｜时序脉冲", "answer": "apb2srtop把外部标准APB访问转换成srtop自定义SR接口时序。APB侧接收命令并准备160-bit写数据，命令经过缓存、1深度pending队列和CDC握手进入sr_clk域，再由状态机产生write setup、enable、hold、read delay和cooldown等控制时序。同时支持busy、done、error和queue_full等状态查询。"}, {"name": "CDC", "patterns": ["cdc", "跨时钟域", "异步fifo", "亚稳态"], "keywords": "两级同步｜握手｜异步FIFO｜Gray码｜多比特一致性", "answer": "CDC要解决亚稳态和多比特数据不一致。单比特电平可以用两级触发器同步，脉冲可以用请求应答握手，多比特连续数据通常使用异步FIFO。我的mc2axi中使用异步FIFO传递command，apb2srtop中使用命令锁存加握手。设计时还要处理复位、空满判断和数据不能在握手完成前变化。"}, {"name": "GPGPU架构", "patterns": ["gpgpu", "gpu架构", "compute core", "dispatcher"], "keywords": "Host｜Dispatcher｜4个Compute Core｜Cache｜Global Memory", "answer": "这个项目是面向矩阵计算的简化GPGPU架构，包括Host配置、CTA Scheduler或Dispatcher、4个Compute Core、Cache、程序与数据存储控制器和Global Memory。Dispatcher根据thread_count、core_id、block_id和thread_id分配任务，每个核心内部完成取指、译码、寄存器读取、运算、访存和写回。项目通过RTL仿真验证8-thread矩阵加法和矩阵乘法。"}, {"name": "指令与寄存器", "patterns": ["指令格式", "16bit指令", "寄存器堆", "4bit寄存器索引", "opcode"], "keywords": "16-bit｜4-bit opcode｜4-bit索引｜8-bit immediate｜16个寄存器", "answer": "项目采用16-bit指令格式，包括4-bit opcode、4-bit寄存器索引和8-bit immediate，支持NOP、BRnzp、CMP、ADD、SUB、MUL、DIV、LDR、STR、CONST和RET等指令。4-bit寄存器索引最多可寻址16个寄存器，寄存器堆通常采用组合读和时钟沿同步写。"}, {"name": "超导动态循环存储器", "patterns": ["超导存储器", "循环存储器", "50ghz", "闭合环路", "bs-drm"], "keywords": "16-bit闭合环路｜SFQ比特流｜动态循环｜50 GHz｜流片验证", "answer": "我的科研工作聚焦超导比特流动态循环存储器。存储单元首尾相连形成闭合环路，让多位SFQ脉冲在环路中持续循环，实现动态保持。我完成了16-bit芯片设计和流片验证，最高可在50 GHz下连续稳定读出。核心难点是环路总延时、控制脉冲时序和版图互连必须严格匹配。"}, {"name": "一维时钟寻址", "patterns": ["一维时钟寻址", "时间寻址", "模n计数器", "按序读出", "ndro"], "keywords": "全局时钟｜模N计数器｜时间位置｜首位对齐｜NDRO", "answer": "一维时钟寻址把数据在环路中的位置映射成时间位置。全局时钟驱动模N计数器，计数值表示当前经过读出口的是第几位数据；到目标位置时打开NDRO门控输出。读出前需要完成首位对齐，使计数器第0位和环路首位数据对应，从而实现连续按序读出。"}, {"name": "PTPX", "patterns": ["ptpx", "功耗分析", "primetime px"], "keywords": "综合网表｜库｜SDC｜UPF｜波形活动｜层次功耗", "answer": "PTPX是基于PrimeTime的功耗分析工具，输入通常包括综合网表、标准单元库、SDC、UPF以及FSDB或VCD波形活动。工具计算内部功耗、开关功耗和泄漏功耗，并可按层次或电源域输出结果。实际工作中关键是保证网表、UPF、SDC和波形层次正确匹配。"}, {"name": "SDC与UPF", "patterns": ["sdc", "upf", "电源域", "时序约束"], "keywords": "时钟约束｜输入输出延时｜电源域｜隔离｜电源状态", "answer": "SDC描述时序环境，包括时钟、输入输出延时、驱动负载和时序例外，用于指导综合和静态时序分析。UPF描述电源域、供电网络、隔离、电平转换、保持和电源状态。两者都要求对象名称与当前网表一致，否则会出现时钟路径、端口或电源连接找不到的问题。"}, {"name": "形式验证", "patterns": ["形式验证", "rtl到网表", "等价性验证", "compare point"], "keywords": "参考设计｜实现设计｜逻辑等价｜compare point｜综合变换", "answer": "RTL到网表形式验证用于证明综合网表与RTL逻辑等价。工具分别读取reference和implementation，建立寄存器和输出等compare point，再通过数学方法逐一证明。出现unmatched或failing point时，先检查版本、层次、参数、黑盒、时钟复位和UPF处理是否一致。"}, {"name": "职业规划", "patterns": ["职业规划", "未来规划", "为什么做数字ic"], "keywords": "数字IC｜SoC前端｜存储与互联｜独立负责模块", "answer": "我的职业方向是数字芯片设计和SoC前端。近期希望把RTL、总线协议、CDC、验证和时序约束做扎实，能够独立负责一个IP从需求到验证交付。中期希望继续深耕存储控制器、片上互联和高性能数据通路，逐步提升到系统架构和性能优化。"}];</script><script src="app.js"></script></body></html>
